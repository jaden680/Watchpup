appId: com.jaden.watchpup
productName: Watchpup
directories:
  output: out
files:
  - dist/electron/**
  - renderer/**
  - package.json
extraResources:
  - from: dist/native/watchpup-reminders
    to: watchpup-reminders
  - from: dist/native/Watchpup.app
    to: Watchpup.app
mac:
  extendInfo:
    NSRemindersFullAccessUsageDescription: Watchpup에서 선택한 미리 알림 목록과 업무 링크를 표시하고 관리합니다.
    NSRemindersUsageDescription: Watchpup에서 선택한 미리 알림 목록과 업무 링크를 표시하고 관리합니다.
    NSCalendarsFullAccessUsageDescription: Watchpup 잔소리에서 곧 시작할 일정을 미리 알려드립니다.
    NSCalendarsUsageDescription: Watchpup 잔소리에서 곧 시작할 일정을 미리 알려드립니다.
  target: dmg
  category: public.app-category.productivity
  icon: build/icon.png
asarUnpack:
  - "**/node_modules/@napi-rs/keyring/**"
publish: null
